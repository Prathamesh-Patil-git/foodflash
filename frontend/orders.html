<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Track your FoodFlash orders and view order history.">
  <title>My Orders — FoodFlash</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <nav class="navbar scrolled" id="navbar">
    <div class="container">
      <a href="index.html" class="nav-logo"><span>🍔</span> FoodFlash</a>
      <div class="nav-links" id="navLinks">
        <a href="index.html">Home</a><a href="menu.html">Menu</a>
        <a href="cart.html">Cart</a><a href="orders.html" class="active">My Orders</a>
      </div>
      <div class="nav-actions">
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
          <i class="fas fa-moon"></i><i class="fas fa-sun"></i>
        </button>
        <a href="cart.html" class="btn-icon cart-btn"><i class="fas fa-cart-shopping"></i><span class="cart-count" id="navCartCount">0</span></a>
        <a href="login.html" class="btn btn-primary btn-sm">Login</a>
        <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
      </div>
    </div>
  </nav>

  <main class="section" style="padding-top:120px;">
    <div class="container" style="max-width:860px;">
      <h1 class="section-title">My Orders</h1>
      <p class="section-subtitle">Track and manage your food orders</p>

      <!-- Dynamic order cards rendered by orders.js -->
      <div id="ordersContainer">
        <div style="text-align:center;padding:40px 0;">
          <i class="fas fa-spinner fa-spin" style="font-size:2rem;color:var(--accent-orange);"></i>
          <p style="margin-top:16px;color:var(--text-muted);">Loading your orders...</p>
        </div>
      </div>
    </div>
  </main>

  <button class="chatbot-toggle" id="chatbotToggle"><i class="fas fa-comment-dots"></i></button>
  <div class="chatbot-window" id="chatbotWindow">
    <div class="chatbot-header"><h4><i class="fas fa-robot"></i> FoodFlash AI</h4><p>Powered by Gemini + ChromaDB</p></div>
    <div class="chatbot-messages" id="chatMessages"><div class="chat-msg bot">Need help with an order? Ask me!</div></div>
    <div class="chatbot-input"><input type="text" id="chatInput" placeholder="Ask me anything..."><button id="chatSend"><i class="fas fa-paper-plane"></i></button></div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/orders.js"></script>
  <script src="js/chatbot.js"></script>
</body>
</html>
