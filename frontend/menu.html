<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Browse the FoodFlash menu — filter by cuisine, veg/non-veg, price range, and search for your favourite dishes.">
  <title>Menu — FoodFlash</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <!-- NAVBAR -->
  <nav class="navbar scrolled" id="navbar">
    <div class="container">
      <a href="index.html" class="nav-logo"><span>🍔</span> FoodFlash</a>
      <div class="nav-links" id="navLinks">
        <a href="index.html">Home</a>
        <a href="menu.html" class="active">Menu</a>
        <a href="cart.html">Cart</a>
        <a href="orders.html">My Orders</a>
      </div>
      <div class="nav-actions">
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
          <i class="fas fa-moon"></i><i class="fas fa-sun"></i>
        </button>
        <a href="cart.html" class="btn-icon cart-btn"><i class="fas fa-cart-shopping"></i><span class="cart-count" id="navCartCount">0</span></a>
        <a href="login.html" class="btn btn-primary btn-sm">Login</a>
        <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
      </div>
    </div>
  </nav>

  <main class="section" style="padding-top:120px;">
    <div class="container">
      <h1 class="section-title">Explore Our Menu</h1>
      <p class="section-subtitle">Find exactly what you're craving</p>

      <!-- Search -->
      <div class="search-bar" id="searchBar">
        <i class="fas fa-search search-icon"></i>
        <input type="text" id="menuSearch" placeholder="Search for dishes, restaurants, cuisines...">
      </div>

      <!-- Filters -->
      <div class="category-filters" id="categoryFilters">
        <button class="category-chip active" data-cat="all">🍽️ All</button>
        <button class="category-chip" data-cat="north-indian">🍛 North Indian</button>
        <button class="category-chip" data-cat="italian">🍕 Italian</button>
        <button class="category-chip" data-cat="chinese">🥡 Chinese</button>
        <button class="category-chip" data-cat="south-indian">🥘 South Indian</button>
        <button class="category-chip" data-cat="american">🍔 American</button>
        <button class="category-chip" data-cat="veg">🌿 Veg Only</button>
      </div>

      <!-- Menu Grid -->
      <div class="food-grid" id="menuGrid"></div>

      <div id="noResults" style="display:none;text-align:center;padding:60px 0;">
        <div style="font-size:3rem;margin-bottom:16px;">😕</div>
        <h3 style="margin-bottom:8px;">No dishes found</h3>
        <p style="color:var(--text-muted);">Try a different search or filter</p>
      </div>
    </div>
  </main>

  <!-- CHATBOT WIDGET -->
  <button class="chatbot-toggle" id="chatbotToggle"><i class="fas fa-comment-dots"></i></button>
  <div class="chatbot-window" id="chatbotWindow">
    <div class="chatbot-header"><h4><i class="fas fa-robot"></i> FoodFlash AI</h4><p>Powered by Gemini + ChromaDB</p></div>
    <div class="chatbot-messages" id="chatMessages"><div class="chat-msg bot">Hey! 👋 Ask me about any dish or cuisine!</div></div>
    <div class="chatbot-input"><input type="text" id="chatInput" placeholder="Ask me anything..."><button id="chatSend"><i class="fas fa-paper-plane"></i></button></div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/menu.js"></script>
  <script src="js/chatbot.js"></script>
</body>
</html>
