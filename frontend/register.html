<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Create your FoodFlash account and start ordering delicious food.">
  <title>Register — FoodFlash</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <nav class="navbar scrolled" id="navbar">
    <div class="container">
      <a href="index.html" class="nav-logo"><span>🍔</span> FoodFlash</a>
      <div class="nav-links" id="navLinks">
        <a href="index.html">Home</a><a href="menu.html">Menu</a>
        <a href="cart.html">Cart</a><a href="orders.html">My Orders</a>
      </div>
      <div class="nav-actions">
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
          <i class="fas fa-moon"></i><i class="fas fa-sun"></i>
        </button>
        <a href="login.html" class="btn btn-primary btn-sm">Login</a>
        <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
      </div>
    </div>
  </nav>

  <div class="auth-page">
    <div class="auth-card animate-in">
      <div style="text-align:center;margin-bottom:8px;font-size:2.5rem;">🎉</div>
      <h2 style="text-align:center;">Create Account</h2>
      <p class="subtitle" style="text-align:center;">Join FoodFlash and start ordering</p>
      <form id="registerForm">
        <div class="form-group">
          <label for="fullName"><i class="fas fa-user"></i> Full Name</label>
          <input type="text" id="name" class="form-input" placeholder="John Doe" required>
        </div>
        <div class="form-group">
          <label for="regEmail"><i class="fas fa-envelope"></i> Email Address</label>
          <input type="email" id="regEmail" class="form-input" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label for="phone"><i class="fas fa-phone"></i> Phone Number</label>
          <input type="tel" id="phone" class="form-input" placeholder="+91 98765 43210" required>
        </div>
        <div class="form-group">
          <label for="regPassword"><i class="fas fa-lock"></i> Password</label>
          <input type="password" id="regPassword" class="form-input" placeholder="Min 8 characters" required minlength="8">
        </div>
        <div class="form-group">
          <label for="confirmPassword"><i class="fas fa-lock"></i> Confirm Password</label>
          <input type="password" id="confirmPassword" class="form-input" placeholder="Re-enter password" required>
        </div>
        <div style="margin-bottom:24px;">
          <label style="display:flex;align-items:flex-start;gap:8px;font-size:0.85rem;color:var(--text-secondary);cursor:pointer;">
            <input type="checkbox" required style="accent-color:var(--accent-orange);margin-top:3px;">
            I agree to the <a href="#" style="color:var(--accent-orange);">Terms of Service</a> and <a href="#" style="color:var(--accent-orange);">Privacy Policy</a>
          </label>
        </div>
        <button type="submit" class="btn btn-primary btn-lg" style="width:100%;">
          <i class="fas fa-user-plus"></i> Create Account
        </button>
      </form>
      <p style="text-align:center;margin-top:24px;font-size:0.9rem;color:var(--text-secondary);">
        Already have an account? <a href="login.html" style="color:var(--accent-orange);font-weight:600;">Sign In</a>
      </p>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
