<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard — FoodFlash</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <div class="admin-layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-logo"><span>🍔</span> FoodFlash</div>
      <nav class="sidebar-nav">
        <a href="#" class="active" data-section="dashboard"><i class="fas fa-chart-pie"></i> Dashboard</a>
        <a href="#" data-section="menu-items"><i class="fas fa-utensils"></i> Menu Items</a>
        <a href="#" data-section="orders"><i class="fas fa-shopping-bag"></i> Orders</a>
        <a href="#" data-section="customers"><i class="fas fa-users"></i> Customers</a>
        <a href="#" data-section="payments"><i class="fas fa-credit-card"></i> Payments</a>
        <a href="#" data-section="chatbot"><i class="fas fa-robot"></i> AI Chatbot</a>
        <a href="#" data-section="database"><i class="fas fa-database"></i> Database</a>
      </nav>
      <div style="padding:24px;margin-top:auto;border-top:1px solid var(--border-glass);display:flex;flex-direction:column;gap:12px;">
        <a href="index.html" style="color:var(--text-muted);font-size:0.85rem;"><i class="fas fa-arrow-left"></i> Back to Site</a>
        <a href="#" id="adminLogout" style="color:#e74c3c;font-size:0.85rem;"><i class="fas fa-sign-out-alt"></i> Logout</a>
      </div>
    </aside>

    <!-- Main Content (dynamically rendered by admin.js) -->
    <main class="admin-content">
      <div style="text-align:center;padding:80px 0;">
        <i class="fas fa-spinner fa-spin" style="font-size:2rem;color:var(--accent-orange);"></i>
        <p style="margin-top:16px;color:var(--text-muted);">Loading dashboard...</p>
      </div>
    </main>
  </div>

  <!-- Auth guard: redirect non-admin users -->
  <script>
    (function() {
      const user = JSON.parse(localStorage.getItem('foodflash_user') || 'null');
      const token = localStorage.getItem('foodflash_token');
      if (!token || !user || !['admin', 'restaurant'].includes(user.role)) {
        window.location.href = 'admin-login.html';
      }
    })();
  </script>

  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/admin.js"></script>
  <script>
    document.getElementById('adminLogout')?.addEventListener('click', (e) => {
      e.preventDefault();
      localStorage.removeItem('foodflash_token');
      localStorage.removeItem('foodflash_user');
      localStorage.removeItem('foodflash_cart');
      window.location.href = 'admin-login.html';
    });
  </script>
</body>
</html>
