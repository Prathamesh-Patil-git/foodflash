<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Login to your FoodFlash account to order food and track deliveries.">
  <title>Login — FoodFlash</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <nav class="navbar scrolled" id="navbar">
    <div class="container">
      <a href="index.html" class="nav-logo"><span>🍔</span> FoodFlash</a>
      <div class="nav-links" id="navLinks">
        <a href="index.html">Home</a><a href="menu.html">Menu</a>
        <a href="cart.html">Cart</a><a href="orders.html">My Orders</a>
      </div>
      <div class="nav-actions">
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
          <i class="fas fa-moon"></i><i class="fas fa-sun"></i>
        </button>
        <a href="login.html" class="btn btn-primary btn-sm active">Login</a>
        <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
      </div>
    </div>
  </nav>

  <div class="auth-page">
    <div class="auth-card animate-in">
      <div style="text-align:center;margin-bottom:8px;font-size:2.5rem;">🍔</div>
      <h2 style="text-align:center;">Welcome Back</h2>
      <p class="subtitle" style="text-align:center;">Sign in to continue ordering</p>
      <form id="loginForm">
        <div class="form-group">
          <label for="email"><i class="fas fa-envelope"></i> Email Address</label>
          <input type="email" id="email" class="form-input" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label for="password"><i class="fas fa-lock"></i> Password</label>
          <input type="password" id="password" class="form-input" placeholder="Enter your password" required>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;font-size:0.85rem;">
          <label style="display:flex;align-items:center;gap:6px;color:var(--text-secondary);cursor:pointer;">
            <input type="checkbox" style="accent-color:var(--accent-orange);"> Remember me
          </label>
          <a href="#" style="color:var(--accent-orange);">Forgot password?</a>
        </div>
        <button type="submit" class="btn btn-primary btn-lg" style="width:100%;">
          <i class="fas fa-sign-in-alt"></i> Sign In
        </button>
      </form>

      <p style="text-align:center;margin-top:24px;font-size:0.9rem;color:var(--text-secondary);">
        Don't have an account? <a href="register.html" style="color:var(--accent-orange);font-weight:600;">Sign Up</a>
      </p>
    </div>
  </div>


  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
